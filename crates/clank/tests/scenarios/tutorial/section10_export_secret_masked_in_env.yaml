desc: "Tutorial §10 — export --secret marks a variable; env exits 0 and emits no errors"
stdin: |
  export --secret GITHUB_TOKEN=ghp_test
  env
# env stdout contains machine-specific variables and cannot be asserted exactly.
# The masking contract (GITHUB_TOKEN=***) is covered by Level 2 integration tests
# in clank-shell/tests/. This fixture only verifies the command succeeds without error.
stderr: ''
